<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GREENS 収支ナビ（モックアップ v1）</title>
<style>
  :root{
    --navy:#173a5e; --navy-2:#1e4d7b; --ink:#1f2937; --body:#374151; --sub:#6b7280;
    --line:#e5e7eb; --bg:#f4f6f9; --card:#ffffff;
    --ok-bg:#dcfce7; --ok-fg:#15803d; --warn-bg:#fef3c7; --warn-fg:#b45309; --ng-bg:#fee2e2; --ng-fg:#b91c1c;
    --accent:#0e7490;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    color:var(--body);background:var(--bg);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  .app{display:flex;min-height:100vh;}

  /* Sidebar */
  .side{width:236px;background:var(--navy);color:#dbe7f1;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.12);}
  .brand .logo{font-size:16px;font-weight:700;color:#fff;letter-spacing:.02em;}
  .brand .logo span{color:#7dd3c0;}
  .brand .sub{font-size:11px;color:#9fb6cc;margin-top:3px;}
  .nav{padding:10px 10px;flex:1;display:flex;flex-direction:column;}
  .nav button.addon{color:#f87171;align-items:flex-start;}
  .nav button.addon:hover{background:rgba(248,113,113,.12);color:#fca5a5;}
  .nav button.addon .ic{color:#f87171;opacity:1;}
  .nav button.addon.active{background:rgba(248,113,113,.16);color:#fecaca;}
  .nav button.addon .addnote{display:block;font-size:10px;color:#fca5a5;font-weight:400;margin-top:2px;}
  .nav .group{font-size:10px;color:#7f9bb5;letter-spacing:.08em;padding:12px 10px 4px;}
  .nav button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;border:0;background:transparent;color:#cfdcea;
    padding:9px 11px;border-radius:8px;cursor:pointer;font-size:13.5px;font-family:inherit;margin-bottom:2px;}
  .nav button:hover{background:rgba(255,255,255,.07);color:#fff;}
  .nav button.active{background:var(--navy-2);color:#fff;font-weight:600;}
  .nav .ic{width:18px;text-align:center;opacity:.9;}
  .nav .navbadge{margin-left:auto;background:#ef4444;color:#fff;font-size:10.5px;font-weight:700;min-width:18px;height:18px;border-radius:9px;align-items:center;justify-content:center;padding:0 5px;}
  .nav .newbtn{margin:8px 6px 0;background:#7dd3c0;color:#0f2e1f;font-weight:700;justify-content:center;}
  .nav .newbtn:hover{background:#6cc6b2;color:#0f2e1f;}
  .side .foot{padding:14px 16px;border-top:1px solid rgba(255,255,255,.12);font-size:10.5px;color:#8ba3ba;}
  .side .foot b{color:#c7d6e5;}

  /* Main */
  .main{flex:1;min-width:0;display:flex;flex-direction:column;}
  .topbar{background:#fff;border-bottom:1px solid var(--line);padding:12px 26px;display:flex;align-items:center;justify-content:space-between;}
  .topbar h1{font-size:17px;margin:0;color:var(--ink);font-weight:700;}
  .topbar .crumb{font-size:11px;color:var(--sub);margin-bottom:2px;}
  .searchwrap{display:flex;align-items:center;gap:6px;background:#f1f5f9;border:1px solid var(--line);border-radius:999px;padding:6px 14px;min-width:250px;}
  .searchwrap .sicon{font-size:13px;color:var(--sub);}
  .searchwrap input{border:0;background:transparent;outline:none;font-size:13px;font-family:inherit;color:var(--ink);width:100%;}
  .searchwrap #search-msg{font-size:11px;color:var(--ng-fg);white-space:nowrap;}
  @media(max-width:860px){ .searchwrap{display:none;} }
  /* トップ常設のプレビュー切替バー（提案デモ用：立場を切り替えて見せる） */
  .previewbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--navy);color:#dbe7f1;padding:9px 26px;position:sticky;top:0;z-index:6;border-bottom:1px solid rgba(255,255,255,.10);}
  .previewbar .pvlabel{font-size:12px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px;}
  .previewbar .pvlabel small{font-weight:500;color:#9fb6cc;font-size:11px;}
  .pvtoggle{display:flex;gap:7px;align-items:center;margin-left:auto;flex-wrap:wrap;}
  .pvtoggle button{border:1px solid rgba(255,255,255,.24);background:rgba(255,255,255,.07);color:#dbe7f1;padding:7px 17px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;border-radius:999px;}
  .pvtoggle button:hover{background:rgba(255,255,255,.14);}
  .pvtoggle button.on{background:#fff;color:var(--navy);border-color:#fff;}
  .pvtoggle button.sub{font-weight:600;font-size:12px;padding:6px 13px;opacity:.9;}
  .pvtoggle .pvsep{color:#7a93ad;font-size:11px;padding:0 1px;}
  /* オプション（任意・追加費用）バッジ */
  .optbadge{display:inline-block;background:#ef4444;color:#fff;font-size:9.5px;font-weight:800;letter-spacing:.04em;padding:1px 7px;border-radius:999px;margin-left:7px;vertical-align:middle;}
  .content{padding:24px 26px 60px;max-width:1180px;}

  /* generic */
  .row{display:flex;gap:16px;flex-wrap:wrap;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;}
  .card h3{margin:0 0 12px;font-size:14px;color:var(--ink);font-weight:700;}
  .muted{color:var(--sub);}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px;}
  .kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;}
  .kpi .l{font-size:12px;color:var(--sub);}
  .kpi .v{font-size:26px;font-weight:700;color:var(--ink);margin-top:4px;}
  .kpi .v small{font-size:13px;font-weight:600;color:var(--sub);}
  .sectiontitle{font-size:13px;font-weight:700;color:var(--ink);margin:24px 0 10px;display:flex;align-items:center;gap:8px;}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11.5px;font-weight:700;line-height:1.7;}
  .j-ok{background:var(--ok-bg);color:var(--ok-fg);} .j-warn{background:var(--warn-bg);color:var(--warn-fg);} .j-ng{background:var(--ng-bg);color:var(--ng-fg);}
  .j-muted{background:#f1f5f9;color:#64748b;} /* 進行中以外（実績分析済・見送り）の判定はグレー表示 */
  .st{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:600;background:#eef2f7;color:#475569;border:1px solid #e2e8f0;}
  .st.await{background:#fff7ed;color:#c2410c;border-color:#fed7aa;}
  .st.sell{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;}
  .st.done{background:#f1f5f9;color:#64748b;border-color:#e2e8f0;} /* 進行中以外＝グレー */
  .st.rej{background:#f1f5f9;color:#64748b;border-color:#e2e8f0;} /* 進行中以外＝グレー */
  .st.returned{background:#fef2f2;color:#b91c1c;border-color:#fecaca;}
  /* 承認サインオフ（担当／上長／代表） */
  .signoffrow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:2px 0 6px;}
  .signoff{border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff;}
  .signoff .so-role{font-size:10.5px;color:var(--sub);}
  .signoff .so-name{font-size:13px;font-weight:700;color:var(--ink);margin:2px 0;}
  .signoff .so-state{font-size:11.5px;font-weight:700;}
  .signoff .so-date{font-weight:400;color:var(--sub);margin-left:6px;font-size:10.5px;}
  .signoff.ok{background:#f0fdf4;border-color:#bbf7d0;} .signoff.ok .so-state{color:#15803d;}
  .signoff.wait{background:#fff7ed;border-color:#fed7aa;} .signoff.wait .so-state{color:#c2410c;}
  .signoff.ret{background:#fef2f2;border-color:#fecaca;} .signoff.ret .so-state{color:#b91c1c;}
  .signoff.rej{background:#f8fafc;} .signoff.rej .so-state{color:#64748b;}
  .signoff.none{background:#fafafa;} .signoff.none .so-state{color:#9ca3af;}
  .arrowstep{display:flex;align-items:center;justify-content:center;color:var(--sub);font-size:11px;}
  /* 承認ダッシュボードのグラフ部品 */
  .gaugewrap{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:6px;}
  @media(max-width:600px){ .gaugewrap{grid-template-columns:1fr;} }
  .gauge .gl{display:flex;justify-content:space-between;font-size:11.5px;color:var(--sub);margin-bottom:3px;}
  .gauge .gl b{color:var(--ink);font-size:14px;}
  .meter{position:relative;height:20px;background:#eef2f7;border-radius:6px;margin:14px 0 4px;}
  .meter-fill{position:absolute;left:0;top:0;height:100%;border-radius:6px;}
  .meter-mark{position:absolute;top:-2px;height:24px;width:2px;background:#334155;}
  .meter-mark span{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:8.5px;color:#334155;white-space:nowrap;}
  .barrow{display:grid;grid-template-columns:96px 1fr 86px;align-items:center;gap:10px;margin:7px 0;font-size:12px;}
  .barrow .bt{color:var(--ink);font-weight:600;}
  .barrow .bv{text-align:right;color:var(--sub);font-variant-numeric:tabular-nums;}
  .stack{display:flex;height:22px;border-radius:6px;overflow:hidden;margin:8px 0 6px;}
  .stack span{display:block;height:100%;}
  .legend{display:flex;flex-wrap:wrap;gap:4px 14px;font-size:11px;color:var(--body);}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:-1px;}
  .rangebar{position:relative;height:24px;background:#eef2f7;border-radius:6px;margin:20px 0 6px;}
  .rangebar .band{position:absolute;top:0;height:100%;background:#c7e7d8;}
  .rangebar .avg{position:absolute;top:0;height:100%;width:2px;background:#0f766e;opacity:.5;}
  .rangebar .marker{position:absolute;top:-4px;height:32px;width:3px;background:#0f766e;border-radius:2px;}
  .rangebar .marker span{position:absolute;top:-17px;left:50%;transform:translateX(-50%);font-size:9.5px;font-weight:700;color:#0f766e;white-space:nowrap;}
  .kvcols{display:grid;grid-template-columns:repeat(3,1fr);gap:2px 22px;}
  @media(max-width:900px){ .kvcols{grid-template-columns:repeat(2,1fr);} }
  @media(max-width:560px){ .kvcols{grid-template-columns:1fr;} }
  .kvcols .kvrow{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:12.5px;}
  .kvcols .kvrow .k{color:var(--sub);white-space:nowrap;}
  .kvcols .kvrow .v{color:var(--ink);font-weight:600;text-align:right;}
  .subhead{font-size:11.5px;font-weight:700;color:#15564a;margin:14px 0 4px;letter-spacing:.02em;}
  table .grp td{background:#eef6f3;font-weight:700;color:#0f3d33;}
  /* アクションカード（各フェーズの最重要操作＝他と差別化） */
  .action-card{border:2px solid #15564a;border-radius:14px;padding:0;overflow:hidden;box-shadow:0 10px 28px rgba(0,0,0,.12);background:#fff;}
  .action-card .apptitle{background:#15564a;color:#fff;padding:13px 20px;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .action-card .apptitle .lead{display:flex;align-items:center;gap:9px;}
  .action-card .apptitle .ic{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,.18);display:inline-flex;align-items:center;justify-content:center;font-size:15px;}
  .action-card .apptitle .tag{font-size:10.5px;padding:4px 11px;border-radius:999px;font-weight:700;letter-spacing:.05em;background:rgba(255,255,255,.22);}
  .action-card .apptitle .tag.todo{background:#fde68a;color:#92400e;}
  .action-card .appbody{padding:16px 20px 18px;}
  .action-card .apptarget{font-size:12px;color:var(--sub);margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed var(--line);}
  .action-card .apptarget b{color:var(--ink);font-size:13.5px;}
  .phase-approve{border-color:#15564a;} .phase-approve .apptitle{background:linear-gradient(90deg,#15564a,#1f8a70);}
  .phase-buy{border-color:#1d4ed8;} .phase-buy .apptitle{background:linear-gradient(90deg,#1e3a8a,#2563eb);}
  .phase-sell{border-color:#0e7490;} .phase-sell .apptitle{background:linear-gradient(90deg,#0e7490,#0891b2);}
  .phase-done{border-color:#15803d;} .phase-done .apptitle{background:linear-gradient(90deg,#166534,#16a34a);}
  .st.approved{background:#eef2ff;color:#4338ca;border-color:#c7d2fe;}
  /* 実績分析：計画→実績の答え合わせ */
  .insight{border:2px solid #1f8a70;background:linear-gradient(180deg,#effdf8,#ffffff);border-radius:12px;padding:16px 18px;margin-bottom:16px;}
  .insight .big{font-size:22px;font-weight:800;line-height:1.3;}
  .rvtable td{vertical-align:top;}
  .rvtable tbody tr.rvnote td{padding-top:0;font-size:11px;color:var(--sub);}
  .rvtag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap;}
  .rvtag.up{background:#dcfce7;color:#15803d;} .rvtag.down{background:#fef3c7;color:#b45309;}

  table{width:100%;border-collapse:collapse;}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;color:var(--body);}
  th{font-size:11.5px;color:var(--sub);font-weight:600;background:#fafbfc;}
  tr.clickable{cursor:pointer;}
  tr.clickable:hover td{background:#f7fafc;}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums;}

  .btn{border:1px solid var(--line);background:#fff;color:var(--body);padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;}
  .btn:hover{background:#f8fafc;}
  .btn.primary{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600;}
  .btn.primary:hover{background:var(--navy-2);}
  .btn.ok{background:var(--ok-fg);color:#fff;border-color:var(--ok-fg);font-weight:600;}
  .btn.ng{background:#fff;color:var(--ng-fg);border-color:#fca5a5;font-weight:600;}

  /* lifecycle stepper */
  .stepper{display:flex;gap:0;margin:6px 0 18px;flex-wrap:wrap;}
  .step{display:flex;align-items:center;font-size:11.5px;color:var(--sub);}
  .step .dot{width:22px;height:22px;border-radius:50%;background:#e5e7eb;color:#94a3b8;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;margin-right:6px;}
  .step .lab{margin-right:6px;white-space:nowrap;}
  .step .bar{width:22px;height:2px;background:#e5e7eb;margin-right:6px;}
  .step.done .dot{background:#bbf7d0;color:#15803d;}
  .step.cur .dot{background:var(--navy);color:#fff;}
  .step.cur .lab{color:var(--ink);font-weight:700;}

  .scen{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .scen .s{border:1px solid var(--line);border-radius:10px;padding:14px;}
  .scen .s.mid{border-color:var(--navy);box-shadow:0 0 0 2px rgba(23,58,94,.08);}
  .scen .s .t{font-size:12px;color:var(--sub);}
  .scen .s .p{font-size:20px;font-weight:700;color:var(--ink);margin:4px 0;}
  .scen .s .r{font-size:13px;}
  .badge-mid{font-size:10px;background:var(--navy);color:#fff;padding:1px 7px;border-radius:999px;margin-left:6px;vertical-align:middle;}

  .judgebox{display:flex;align-items:center;gap:18px;padding:16px 20px;border-radius:12px;border:1px solid var(--line);}
  .judgebox .big{font-size:32px;font-weight:800;}
  .judgebox.j-ok{background:#f0fdf6;border-color:#bbf7d0;} .judgebox.j-ok .big{color:var(--ok-fg);}
  .judgebox.j-warn{background:#fffbeb;border-color:#fde68a;} .judgebox.j-warn .big{color:var(--warn-fg);}
  .judgebox.j-ng{background:#fef2f2;border-color:#fecaca;} .judgebox.j-ng .big{color:var(--ng-fg);}

  .twocol{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;}
  dl.kv{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;margin:0;}
  dl.kv dt{color:var(--sub);font-size:12.5px;} dl.kv dd{margin:0;color:var(--ink);font-weight:600;}
  .typeselect{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .typeselect span{font-size:12px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--sub);}
  .typeselect span.on{background:#ecfeff;border-color:var(--accent);color:var(--accent);font-weight:700;}
  .typeselect span.soon{opacity:.6;}
  .notebar{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:16px;}
  .future{background:#f8fafc;border:1px dashed #cbd5e1;border-radius:10px;padding:16px;color:#475569;}
  .future .tag{font-size:10.5px;background:#e2e8f0;color:#475569;padding:2px 8px;border-radius:999px;font-weight:700;}
  .field label{display:block;font-size:11.5px;color:var(--sub);margin-bottom:3px;}
  .field input,.field select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff;}
  .field input:focus,.field select:focus{outline:2px solid #bae6fd;border-color:var(--accent);}
  .field.green-in input{background:#f0fdf4;border-color:#bbf7d0;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px 12px;}
  .cellin{width:100%;padding:6px 8px;border:1px solid #bbf7d0;background:#f0fdf4;border-radius:6px;font-family:inherit;font-size:12.5px;color:var(--ink);}
  .calcpanel{position:sticky;top:84px;}
  .srctag{display:inline-block;font-size:9.5px;background:#e2e8f0;color:#475569;padding:1px 6px;border-radius:999px;margin-left:6px;vertical-align:middle;font-weight:700;}
  .srctag.sale{background:#dbeafe;color:#1d4ed8;} .srctag.rent{background:#fef3c7;color:#b45309;} .srctag.pub{background:#ede9fe;color:#6d28d9;}
  .hidden{display:none;}
  .flash{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;}
  .back{font-size:12px;color:var(--accent);cursor:pointer;display:inline-block;margin-bottom:10px;}
  .delta-up{color:var(--ng-fg);} .delta-dn{color:var(--ok-fg);}
  /* 新規起票：表示切替トグル */
  .viewtoggle{display:flex;align-items:center;gap:6px;margin-bottom:12px;}
  .viewtoggle .vt-lab{font-size:11px;color:var(--sub);margin-right:4px;}
  .viewtoggle button{border:1px solid var(--line);background:#fff;color:var(--sub);padding:7px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:12.5px;font-weight:600;}
  .viewtoggle button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
  /* 新規起票：エクセル風グリッド */
  .xwrap{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;}
  .xgrid{border-collapse:collapse;width:100%;font-size:12px;}
  .xgrid td{border:1px solid #cbd5e1;padding:3px 7px;color:var(--ink);vertical-align:middle;}
  .xgrid .sec{background:#15564a;color:#fff;font-weight:700;font-size:11.5px;letter-spacing:.02em;}
  .xgrid .grp{background:#d7ece4;color:#0f3d33;font-weight:700;}
  .xgrid .lbl{background:#f1f5f9;font-weight:600;color:#334155;white-space:nowrap;}
  .xgrid .gin{background:#eafaf0;padding:0;}
  .xgrid .auto{background:#fbfdff;color:#475569;}
  .xgrid .rmk{color:#94a3b8;font-size:11px;white-space:nowrap;}
  .xgrid .tot{background:#fff7ed;font-weight:800;color:var(--ink);}
  .xgrid .num{text-align:right;}
  .xgrid input.xin,.xgrid select.xin{width:100%;border:0;background:transparent;font-family:inherit;font-size:12px;color:var(--ink);padding:4px 6px;}
  .xgrid .num input.xin{text-align:right;}
  .xgrid input.xin:focus,.xgrid select.xin:focus{outline:2px solid #86efac;background:#fff;}
  .xcols{display:grid;grid-template-columns:1fr 1.4fr;gap:14px;margin-top:14px;}
  @media(max-width:860px){ .kpis{grid-template-columns:repeat(2,1fr);} .scen{grid-template-columns:1fr;} .twocol{grid-template-columns:1fr;} .side{display:none;} .xcols{grid-template-columns:1fr;} }
  /* ダッシュボード：案件フロー（検討中 → 承認待ち → 販売中） */
  .flow{display:flex;align-items:stretch;gap:0;margin:4px 0 22px;flex-wrap:wrap;}
  .flow .stage{flex:1 1 160px;background:#fff;border:1px solid var(--line);padding:13px 16px;}
  .flow .stage.st1{border-top:3px solid #64748b;}
  .flow .stage.st2{border-top:3px solid #d97706;}
  .flow .stage.st3{border-top:3px solid #0891b2;}
  .flow .stage .sl{font-size:12px;color:var(--sub);font-weight:700;}
  .flow .stage .sv{font-size:26px;font-weight:800;color:var(--ink);margin-top:3px;line-height:1.05;}
  .flow .stage .sv small{font-size:13px;font-weight:600;color:var(--sub);}
  .flow .stage .sc{font-size:11px;color:var(--sub);margin-top:5px;line-height:1.5;}
  .flow .stage .branch{color:var(--ng-fg);font-weight:700;}
  .flow .arrow{display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:18px;padding:0 7px;flex:0 0 auto;}
  /* 注釈：吹き出し（スピーチバブル） */
  .bubble{position:relative;background:#fffbeb;border:1px solid #fcd34d;color:#92400e;padding:11px 15px;font-size:12.5px;line-height:1.65;margin:8px 0 22px;box-shadow:0 1px 2px rgba(0,0,0,.05);}
  .bubble::before{content:"";position:absolute;top:-10px;left:26px;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:10px solid #fcd34d;}
  .bubble::after{content:"";position:absolute;top:-8px;left:27px;border-left:9px solid transparent;border-right:9px solid transparent;border-bottom:9px solid #fffbeb;}
  @media(max-width:860px){ .flow{flex-direction:column;} .flow .arrow{transform:rotate(90deg);padding:5px 0;} }
  /* 採用デザインA：本文の枠は四角（角丸を排除）。サイドバー・小チップは現状維持 */
  #content .card, #content .kpi, #content .notebar, #content .judgebox, #content .insight,
  #content .action-card, #content .future, #content .xwrap, #content .signoff,
  #content input, #content select, #content textarea,
  #content .btn, #content .viewtoggle button, #content table,
  #content .meter, #content .meter-fill, #content .rangebar, #content .rangebar .band,
  #content .rangebar .marker, #content .stack, #content .cellin{ border-radius:0 !important; }

  /* =====================================================================
     案C「エディトリアル・ライト」オーバーライド（2026-07-03 中西さん選択）
     先方サイト greens01.co.jp の実配色（#8dbd4c/#729c3a/#f3f5ef/#ff6600）ベース。
     後勝ちの上書き方式＝既存ルールは温存し、このブロックが最終適用される。
     ===================================================================== */
  :root{
    --navy:#1c1f1a; --navy-2:#3a4031; --ink:#1c1f1a; --body:#3a3f38; --sub:#7a8076;
    --line:#e9eae3; --bg:#fcfcfa;
    --ok-bg:#eef4e2; --ok-fg:#4c7c15; --warn-bg:#fff3e6; --warn-fg:#c25400;
    --ng-bg:#fdeae0; --ng-fg:#cc3300;
    --accent:#729c3a;
  }
  /* サイドバー廃止 → 上部ナビ（黒罫線のエディトリアル・ヘッダー） */
  .app{flex-direction:column;}
  .side{width:100%;height:auto;position:static;flex-direction:column;align-items:stretch;
    background:var(--bg);color:var(--ink);border-bottom:2px solid var(--ink);padding:0 22px;}
  .brand{border:0;padding:16px 0 2px;}
  .brand .logo{color:var(--ink);font-size:19px;}
  .brand .logo span{color:var(--ink);border-bottom:3px solid #8dbd4c;padding-bottom:1px;}
  .brand .sub{display:none;}
  .side .foot{display:none;}
  /* タブ化：メニュー行の下余白をなくし、ボタンを黒2px罫線に密着（選択中の黒＝ラインと一体化） */
  .nav{flex-direction:row;align-items:stretch;flex-wrap:wrap;flex:1;padding:4px 0 0;margin-left:-15px;}
  .nav .group{display:none;}
  .nav .ic{display:none;}
  .nav button{width:auto;margin:0;border-radius:0;color:var(--body);padding:9px 13px;font-size:13px;}
  .nav button:hover{background:#f1f3ea;color:var(--ink);}
  .nav button.active{background:var(--ink);color:#fff;font-weight:700;}
  .nav button.addon,.nav button.addon .ic{color:var(--body);}
  .nav button.addon:hover{background:#f1f3ea;color:var(--ink);}
  .nav button.addon.active{background:var(--ink);color:#fff;}
  .nav .newbtn{order:99;margin:7px 0 7px auto;background:#729c3a;color:#fff;border-radius:0;padding:8px 16px;}
  .nav .newbtn:hover{background:#5f8430;color:#fff;}
  .nav .navbadge{border-radius:0;background:#ff6600;}
  .optbadge{background:#ff6600;border-radius:0;}
  @media(max-width:860px){ .side{display:flex;} }
  /* プレビュー帯・部品の角丸排除 */
  .previewbar{background:#11140e;}
  .pvtoggle button{border-radius:0;}
  .pvtoggle button.on{color:#11140e;}
  .pill,.st,.rvtag,.srctag,.badge-mid,.typeselect span,.searchwrap{border-radius:0;}
  .searchwrap{background:#f4f5ef;}
  /* 表：見出しは黒2px罫線（帳票の格） */
  th{background:transparent;border-bottom:2px solid var(--ink);}
  /* KPI：カードをやめ、数字が主役の段組（左罫線区切り） */
  .kpis{border-bottom:1px solid var(--line);padding-bottom:14px;}
  .kpi{background:transparent;border:0 !important;border-left:1px solid var(--line) !important;padding:4px 18px 6px;}
  .kpi:first-child{border-left:0 !important;padding-left:2px;}
  .kpi .v{font-size:30px;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  /* 吹き出し → 左罫線の編集ノート（AI感排除） */
  .bubble{background:#f6f7f1;border:0;border-left:3px solid var(--ink);color:var(--body);box-shadow:none;}
  .bubble::before,.bubble::after{content:none;}
  .notebar{background:#f6f7f1;border:0;border-left:3px solid #ff6600;color:var(--body);}
  /* 緑・オレンジへの色寄せ（旧ティール/ブルー/イエロー系を置換） */
  .xgrid .sec{background:var(--ink);}
  .xgrid .grp{background:#e9efdd;color:#3f5720;}
  .subhead{color:#3f5720;}
  table .grp td{background:#f1f4e8;color:#3f5720;}
  .insight{border-color:#729c3a;background:#f7faee;}
  .st.sell{background:#f1f6e6;color:#4c7c15;border-color:#d6e3b8;}
  .st.approved{background:#eef2e4;color:#3f5720;border-color:#d6e3b8;}
  .flow .stage.st2{border-top-color:#ff6600;}
  .flow .stage.st3{border-top-color:#729c3a;}
  .rangebar .band{background:#dde8c8;}
  .rangebar .avg,.rangebar .marker{background:#729c3a;}
  .rangebar .marker span{color:#3f5720;}
  .typeselect span.on{background:#f1f6e6;}
  .field input:focus,.field select:focus{outline:2px solid #d6e8b8;}
  .action-card{box-shadow:0 6px 18px rgba(20,25,16,.10);}
  .phase-approve{border-color:#3f5720;} .phase-approve .apptitle{background:#3f5720;}
  .phase-buy{border-color:#1c1f1a;} .phase-buy .apptitle{background:#1c1f1a;}
  .phase-sell{border-color:#c25400;} .phase-sell .apptitle{background:#c25400;}
  .phase-done{border-color:#729c3a;} .phase-done .apptitle{background:#729c3a;}
  /* ヘッダー整理（2026-07-03）：項目間隔を広げ、オプション4機能は「オプション機能 ▾」ホバーメニューに集約 */
  .side{padding:0 28px;}
  .brand{padding-right:22px;}
  .nav{gap:6px;}
  .nav button{padding:10px 15px;white-space:nowrap;}
  .optdrop{position:relative;}
  .optdrop-btn{display:flex;align-items:center;gap:7px;border:0;background:transparent;color:var(--body);padding:10px 15px;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;height:100%;}
  .optdrop-btn .caret{font-size:12.5px;color:inherit;font-weight:700;line-height:1;position:relative;top:1px;}
  .optdrop:hover .optdrop-btn,.optdrop:focus-within .optdrop-btn{background:#f1f3ea;color:var(--ink);}
  .optdrop:has(button.active) .optdrop-btn{background:var(--ink);color:#fff;}
  .optdrop:has(button.active) .optdrop-btn .caret{color:#b9c2ae;}
  .optdrop-menu{display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid var(--ink);min-width:250px;z-index:60;box-shadow:0 10px 26px rgba(20,25,16,.14);padding:4px 0 6px;}
  .optdrop:hover .optdrop-menu,.optdrop:focus-within .optdrop-menu{display:block;}
  .optdrop-note{font-size:10.5px;color:var(--sub);padding:8px 14px 6px;border-bottom:1px solid var(--line);margin-bottom:4px;}
  .optdrop-menu button{display:flex;width:100%;text-align:left;padding:10px 14px;}
  .optdrop-menu button.active{background:var(--ink);color:#fff;}
  /* 左右バランス（2026-07-03）：サイドバー廃止で右に余っていた分、本文列を中央寄せ。
     ヘッダー・プレビュー帯・タイトル帯の中身も同じ列位置に揃える（max()で狭い画面は従来余白） */
  .content{max-width:1240px;margin:0 auto;width:100%;}
  .side{padding:0 max(28px, calc((100% - 1240px)/2 + 26px));}
  .previewbar{padding:9px max(26px, calc((100% - 1240px)/2 + 26px));}
  .topbar{padding:12px max(26px, calc((100% - 1240px)/2 + 26px));}
  /* 角丸の完全排除（2026-07-04 自己点検）：インライン指定の角丸（要対応カード等）も四角に統一 */
  #content [style*="border-radius"]{border-radius:0 !important;}

  /* ===== レイアウト変更（2026-07-04 中西さん指示）：上部タブ → 左サイドバー方式（案Cの配色・質感は維持） ===== */
  .app{flex-direction:row;flex-wrap:wrap;align-items:flex-start;}
  .previewbar{flex:0 0 100%;padding:9px 26px;}
  .side{width:228px;flex:0 0 228px;flex-direction:column;align-items:stretch;position:sticky;top:46px;height:calc(100vh - 46px);
    background:var(--bg);border-bottom:0;border-right:2px solid var(--ink);padding:0;}
  .brand{padding:18px 18px 12px;border-bottom:1px solid var(--line);}
  .brand .logo{font-size:17px;}
  .brand .sub{display:block;font-size:10.5px;color:var(--sub);margin-top:3px;}
  .nav{flex-direction:column;align-items:stretch;flex:1;padding:10px 10px 12px;margin-left:0;gap:2px;}
  .nav .group{display:block;font-size:10px;font-weight:800;letter-spacing:.14em;color:var(--sub);padding:14px 8px 4px;}
  .nav button{width:100%;text-align:left;padding:9px 12px;margin:0;font-size:13px;white-space:normal;}
  .nav .newbtn{order:0;margin:2px 0 8px;width:100%;justify-content:center;}
  .side .foot{display:block;padding:12px 16px;border-top:1px solid var(--line);font-size:10.5px;color:var(--sub);}
  .side .foot b{color:var(--ink);}
  .side .foot span{color:var(--sub) !important;}
  .side .foot span b{color:#ff6600 !important;}
  /* オプション機能：サイドバー最下部に配置。ホバーで右側にフライアウト（下端揃え・上方向に展開） */
  .optdrop{width:100%;margin-top:auto;border-top:1px solid var(--line);padding-top:8px;}
  .optdrop-btn{width:100%;justify-content:space-between;padding:9px 12px;height:auto;color:#ff6600;font-weight:700;}
  .optdrop-menu{top:auto;bottom:0;left:100%;margin-left:2px;}
  .optdrop:hover .optdrop-btn,.optdrop:focus-within .optdrop-btn{color:#ff6600;}
  .optdrop:has(button.active) .optdrop-btn{background:var(--ink);color:#ff8a3d;}
  .optdrop:has(button.active) .optdrop-btn .caret{color:#ff8a3d;}
  /* 本文・帯：全幅前提の中央寄せ計算をサイドバー前提に戻す */
  .topbar{padding:12px 26px;}
  .main{min-width:0;}
  .content{max-width:1180px;margin:0 auto;}
  @media(max-width:860px){ .side{position:static;width:100%;flex:0 0 100%;height:auto;border-right:0;border-bottom:2px solid var(--ink);} }
  /* 案件の流れ／パイプライン（2026-07-04）：白い箱の羅列をやめ、薄緑の帯＋接続線で「流れ」を形で伝える */
  .flow{background:#f4f6ef;padding:18px 22px;align-items:center;gap:0;}
  .flow .stage{background:transparent;border:0;padding:0 10px;flex:0 1 auto;min-width:150px;}
  .flow .stage.st1,.flow .stage.st2,.flow .stage.st3{border-top:0;}
  .flow .stage .sl{color:#3f5720;font-weight:800;letter-spacing:.04em;}
  .flow .stage .sv{font-size:30px;}
  .flow .arrow{flex:1;display:flex;align-items:center;color:#729c3a;font-size:15px;padding:0;min-width:60px;}
  .flow .arrow::before,.flow .arrow::after{content:'';flex:1;border-top:2px solid #c9d9a8;margin:0 8px;}
  @media(max-width:860px){ .flow .arrow::before,.flow .arrow::after{content:none;} }
  /* あなたの要対応（2026-07-04 案B採用）：インボックス・リスト（白×オレンジ罫・縦積み） */
  .reqbox{background:#fff;border:1px solid var(--line);border-top:3px solid #ff6600;margin-bottom:18px;}
  .reqbox .rhd{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;padding:12px 20px;border-bottom:1px solid var(--line);}
  .reqbox .rt{font-weight:800;font-size:14px;color:var(--ink);}
  .reqbox .rcnt{display:inline-block;min-width:22px;text-align:center;background:#ff6600;color:#fff;font-size:12.5px;font-weight:800;padding:1px 8px;margin-left:9px;vertical-align:1px;font-variant-numeric:tabular-nums;}
  .reqbox .rok{display:inline-block;color:#4c7c15;font-size:12.5px;font-weight:800;margin-left:9px;}
  .reqbox .rhd small{font-size:11px;color:var(--sub);}
  .reqrow{display:flex;align-items:center;gap:14px;padding:11px 20px;border-bottom:1px solid #f0f1ea;text-decoration:none;color:inherit;cursor:pointer;}
  .reqrow:hover{background:#fdf7f2;}
  .reqrow .rn{font-size:21px;font-weight:800;color:#ff6600;min-width:48px;font-variant-numeric:tabular-nums;}
  .reqrow .rn small{font-size:11px;color:var(--sub);font-weight:600;}
  .reqrow .rl{font-size:13px;font-weight:700;flex:1;color:var(--ink);}
  .reqrow .rl small{display:block;font-size:11px;color:var(--sub);font-weight:400;}
  .reqrow .rgo{font-size:11.5px;font-weight:700;color:var(--ink);border:1px solid #cfd4c9;padding:5px 14px;white-space:nowrap;}
  .reqrow:hover .rgo{background:var(--ink);color:#fff;border-color:var(--ink);}
  .reqrow.done{opacity:.6;cursor:default;}
  .reqrow.done:hover{background:transparent;}
  .reqrow.done .rn{color:#729c3a;}
  .reqrow.done .rgo{visibility:hidden;}
  .reqbox .rft{font-size:11px;color:var(--sub);padding:9px 20px;background:#fafaf6;}
  .btn.submit-green{background:#729c3a !important;border-color:#729c3a !important;color:#fff !important;}
  .btn.submit-green:hover{background:#5f8430 !important;border-color:#5f8430 !important;}
</style>
</head>

      </div>

function filterList(){
  const t=document.getElementById('f-type').value, jf=document.getElementById('f-judge').value;
  const ar=document.getElementById('f-area').value, st=document.getElementById('f-status').value;
  let arr=visibleDeals().filter(d=>
    (!t||d.type===t) && (!jf||judge(d).k===jf) && (!ar||(d.area||'').includes(ar)) &&
    (!st || (st==='await' ? (d.status==='await_mgr'||d.status==='await_pres') : d.status===st)) );
  const scope = ROLE==='staff' ? `自分の案件 ${arr.length}件` : `${arr.length}件（過去事例は会社の資産として蓄積されます）`;
  document.getElementById('listbody').innerHTML=`<div class="muted" style="margin-bottom:8px;font-size:12px">${scope}</div>`+dealTable(arr,false,ROLE==='staff');
}

/* ---------- 承認パネル（決裁導線） ---------- */
function soCell(role,name,state,date){
  const map={ok:['✓ 承認','ok'],wait:['承認待ち','wait'],ret:['↩ 差し戻し','ret'],rej:['× 見送り','rej'],none:['—','none']};
  const [badge,cls]=map[state]||map.none;
  return `<div class="signoff ${cls}"><div class="so-role">${role}</div><div class="so-name">${name||'—'}</div>
    <div class="so-state">${badge}${date?`<span class="so-date">${date}</span>`:''}</div></div>`;
}
function signoffRow(d){
  const a=d.appr||{}, s=d.status;
  let mgrState,presState;
  if(s==='await_mgr'){ mgrState='wait'; presState='none'; }
  else if(s==='returned'){ mgrState='ret'; presState='none'; }
  else if(s==='await_pres'){ mgrState='ok'; presState='wait'; }
  else if(s==='rej'){ mgrState='ok'; presState='rej'; }
  else { mgrState='ok'; presState='ok'; } // sell / done
  return `<div class="signoffrow">
    ${soCell('担当（起案）',d.staff,'ok',d.updated)}
    ${soCell('上長',a.mgr,mgrState,a.mgrDate)}
    ${soCell('代表',a.pres,presState,a.presDate)}
  </div>`;
}
function approvalPanel(d){
  const s=d.status;
  const ta=ph=>`<div style="margin-top:10px"><textarea placeholder="${ph}" style="width:100%;min-height:50px;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit"></textarea></div>`;
  let action='';
  if(s==='await_mgr'){
    if(ROLE==='mgr') action=`<div class="muted" style="font-size:12.5px;margin-bottom:8px">担当 ${d.staff} から提出。上長のあなたの承認待ちです。</div>
      <div class="row"><button class="btn ok" onclick="act('mgr_approve','${d.id}')">✓ 承認して代表へ</button>
      <button class="btn ng" onclick="act('mgr_return','${d.id}')">↩ 差し戻し</button></div>${ta('コメント / 差し戻し理由')}`;
    else action=`<div class="muted" style="font-size:12.5px">上長（${(d.appr||{}).mgr||'上長'}）の承認待ちです。<br>上部のプレビュー切替で「上長」に切り替えると承認操作を体験できます。</div>`;
  } else if(s==='returned'){
    if(ROLE==='staff') action=`<div class="muted" style="font-size:12.5px;margin-bottom:8px">上長から差し戻されました。事業計画を修正して再提出してください。</div>
      <button class="btn primary" onclick="act('resubmit','${d.id}')">修正して再提出（上長承認へ）</button>`;
    else action=`<div class="muted" style="font-size:12.5px">担当 ${d.staff} が修正中（差し戻し）。</div>`;
  } else if(s==='await_pres'){
    if(ROLE==='boss') action=`<div class="muted" style="font-size:12.5px;margin-bottom:8px">上長（${(d.appr||{}).mgr||'上長'}）承認済み。代表のあなたの最終判断待ちです。</div>
      <div class="row"><button class="btn ok" onclick="act('pres_approve','${d.id}')">✓ 承認して仕入れGO</button>
      <button class="btn ng" onclick="act('pres_reject','${d.id}')">× 見送り</button></div>${ta('コメント / 見送り理由')}`;
    else action=`<div class="muted" style="font-size:12.5px">代表（${(d.appr||{}).pres||'代表'}）の最終承認待ちです。<br>上部のプレビュー切替で「代表」に切り替えると承認操作を体験できます。</div>`;
  } else if(s==='rej'){
    action=`<div class="muted" style="font-size:12.5px"><b style="color:var(--ng-fg)">見送り（代表判断）</b>：${d.rejReason||''}</div>
      <div class="muted" style="font-size:11.5px;margin-top:8px">この理由は「過去実績」に蓄積され、次の判断に活きます。</div>`;
  } else {
    action=`<div class="muted" style="font-size:12.5px"><b style="color:var(--ok-fg)">上長・代表とも承認済み（仕入れGO）。</b><br>販売状況・実績は「実績分析」へ進みます。</div>`;
  }
  const j=judge(d);
  const pending=(s==='await_mgr'||s==='await_pres'||s==='returned');
  const tag = pending ? '<span class="tag todo">要対応</span>' : '<span class="tag">決裁記録</span>';
  return `<div class="card action-card phase-approve">
    <div class="apptitle"><span class="lead"><span class="ic">✓</span>承認（上長 → 代表）</span>${tag}</div>
    <div class="appbody">
      <div class="apptarget">対象：<b>${d.name}</b>（${d.id}・担当 ${d.staff}・更新 ${d.updated}）　判定 <b style="color:var(--ink)">${j.mark} ${j.label}</b></div>
      ${signoffRow(d)}
      <div style="margin-top:8px">${action}</div>
    </div></div>`;
}
function act(kind,id){
  const d=dealById(id); if(!d) return; const a=d.appr||(d.appr={}); const today='06/29';
  if(kind==='mgr_approve'){ d.status='await_pres'; a.mgrDate=today; }
  else if(kind==='mgr_return'){ d.status='returned'; }
  else if(kind==='resubmit'){ d.status='await_mgr'; }
  else if(kind==='pres_approve'){ d.status='approved'; a.presDate=today; }
  else if(kind==='pres_reject'){ d.status='rej'; a.presDate=today; d.rejReason=d.rejReason||'代表判断により見送り（モック）。'; }
  else if(kind==='settle_buy'){ d.status='sell'; d.settle=Object.assign({buySettle:today},d.settle); }
  else if(kind==='settle_sell'){ const amt=gv('op_sell_amount')||d.scen[1].price; d.status='done'; d.actual={price:amt, profit:amt-d.cost, note:(amt>=d.scen[1].price?'販売活動の結果、着地見込み以上で成約':'着地見込みを下回って成約')+'（モック）'}; if(HW_LOCK && HW_DEAL.id===d.id){ HW_LOCK=false; } }
  go('detail',id);
  let msg={mgr_approve:'✓ 上長が承認しました。案件は「代表承認待ち」へ進みます。',
    mgr_return:'↩ 担当へ差し戻しました。担当が修正して再提出します。',
    resubmit:'✓ 再提出しました。「上長承認待ち」に戻ります。',
    pres_approve:'✓ 代表が承認しました（仕入れGO）。次は「仕入決済」です。',
    pres_reject:'× 見送りにしました。見送り理由は過去実績に蓄積されます。',
    settle_buy:'✓ 仕入決済を登録しました。案件は「販売中」へ進みます。',
    price_update:'✓ 売出価格・販売状況を更新しました。',
    settle_sell:'✓ 売却決済を登録しました。実績を確定し「過去実績」に蓄積されました。'}[kind];
  if(kind==='settle_sell' && HW_DEAL.id===id) msg+=' 実績の宿題が解消され、新規起案の申請ができるようになりました。';
  const neg=(kind==='mgr_return'||kind==='pres_reject');
  const f=document.getElementById('flash');
  if(f) f.innerHTML=`<div class="flash"${neg?' style="background:#fef2f2;border-color:#fecaca;color:#991b1b"':''}>${msg}（モック表示）</div>`;
  window.scrollTo(0,0);
}
function pf(label,type,val){ return `<div class="field"><label>${label}</label><input type="${type||'text'}" value="${val!=null&&val!==''?val:''}" placeholder="${type==='date'?'':'入力（モック）'}"></div>`; }
function actionPanel(d){
  const s=d.status;

    <div class="kpis">

/* 種別ごとの構成ドーナツ（売上=price / 粗利=rev / 原価=price-rev） */
function typeDonut(A,key,title){
  const RT=['土地','戸建','アパート'];
  const rows=RT.map(t=>{const rs=A.filter(r=>r.t===t); const gp=rs.reduce((s,r)=>s+r.rev,0), sales=rs.reduce((s,r)=>s+(r.price||0),0); return {t,cnt:rs.length,sales,gp,cost:Math.max(sales-gp,0)};}).filter(x=>x.cnt);
  const total=rows.reduce((s,r)=>s+r[key],0)||1;
  return `<div>
    <div style="font-weight:700;font-size:12.5px;margin-bottom:8px;text-align:center;color:var(--ink)">${title}</div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center">
      ${donutSVG(rows.map(x=>({label:x.t,value:x[key],color:TCOL2[x.t]||'#94a3b8'})),128)}
      <div>${rows.map(x=>`<div style="font-size:11px;margin:4px 0;white-space:nowrap"><span style="display:inline-block;width:9px;height:9px;background:${TCOL2[x.t]||'#94a3b8'};border-radius:2px;margin-right:5px;vertical-align:middle"></span>${x.t}<br><span style="color:var(--sub);margin-left:14px">${fmtYm(x[key])}（${(x[key]/total*100).toFixed(0)}%）</span></div>`).join('')}</div>
    </div>
  </div>`;
}
/* 円グラフ（ドーナツ） */
function donutSVG(segs,size){const r=size/2-14,cx=size/2,cy=size/2,C=2*Math.PI*r,total=segs.reduce((a,s)=>a+s.value,0)||1;let off=0,arcs='';
  segs.forEach(s=>{const len=s.value/total*C;arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${s.color}" stroke-width="20" stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-off).toFixed(2)}" transform="rotate(-90 ${cx} ${cy})"/>`;off+=len;});
  return `<svg viewBox="0 0 ${size} ${size}" style="width:${size}px;height:${size}px;display:block">${arcs}</svg>`;}
/* 構成比バー（単色・控えめ） */

  <div style="height:8px;background:#eef2f6"><div style="height:8px;width:${p.toFixed(1)}%;background:var(--accent)"></div></div></div>`;}
/* 月別ミニ棒（単色） */
function monthBarsHTML(A){const mc=Array.from({length:12},(_,i)=>A.filter(r=>r.bm===i+1).length),mx=Math.max(...mc,1);

function toggleBizMetric(m){ if(BIZ_METRICS.includes(m)){ if(BIZ_METRICS.length>1) BIZ_METRICS=BIZ_METRICS.filter(x=>x!==m); } else { BIZ_METRICS=MET_ORDER.filter(x=>BIZ_METRICS.includes(x)||x===m); } drawBizChart(); }

function niceMaxOf(vals){ const raw=Math.max(...vals.filter(v=>v!=null),1); const mag=Math.pow(10,Math.floor(Math.log10(raw))); return Math.ceil(raw/(mag/2))*(mag/2)||raw; }
let BIZCTX=null;
function bizHover(i){
  const ctx=BIZCTX; if(!ctx) return;
  const svg=document.getElementById('bizsvg'), tp=document.getElementById('biztip'), g=document.getElementById('bizguide');
  if(!svg||!tp||!g) return;
  const r=svg.getBoundingClientRect();
  const px=r.width*((ctx.pl+i*(ctx.pw/(ctx.N-1)))/ctx.W);
  g.style.left=px.toFixed(1)+'px'; g.style.display='block';
  const rows=ctx.series.map(s=>{ const v=s.cur[i], pv=s.prev[i], parts=[];
    if(v!=null) parts.push(`今年 <b>${fmtYm(v)}</b>`);
    if(ctx.compare && pv!=null) parts.push(`<span style="color:#94a3b8">前年 ${fmtYm(pv)}</span>`);
    if(!parts.length) return '';
    return `<div style="display:flex;justify-content:space-between;gap:16px;font-size:11.5px;margin-top:3px"><span style="white-space:nowrap"><span style="display:inline-block;width:8px;height:8px;background:${s.color};border-radius:2px;margin-right:5px"></span>${s.label}</span><span style="white-space:nowrap">${parts.join(' ／ ')}</span></div>`;
  }).filter(Boolean).join('');
  tp.innerHTML=`<div style="font-weight:800;font-size:11px;color:var(--sub);margin-bottom:2px">${i+1}月</div>${rows||'<div style="font-size:11px;color:#94a3b8">データなし</div>'}`;
  tp.style.display='block';
  const tpW=tp.offsetWidth; let left=px+14; if(left+tpW>r.width) left=px-tpW-14; if(left<0) left=0;
  tp.style.left=left.toFixed(1)+'px';
}
function bizHoverOut(){ const tp=document.getElementById('biztip'), g=document.getElementById('bizguide'); if(tp)tp.style.display='none'; if(g)g.style.display='none'; }
function bizMultiSVG(keys,compare,type){
  const W=920,H=340,pl=20,pr=18,pt=18,pb=34, pw=W-pl-pr, ph=H-pt-pb, N=12;
  const x=i=>pl+i*(pw/(N-1));
  const M=keys.map(k=>{ const cur=SERIES[k][2026].slice(); while(cur.length<12) cur.push(null); const prev=SERIES[k][2025]; return {color:MET_DEF[k].color,shape:MET_DEF[k].shape,cur,prev,nm:niceMaxOf([...cur,...(compare?prev:[])])}; });
  const yv=(m,v)=>pt+ph-(v/m.nm)*ph;
  const mk=(sh,cx,cy,c)=>{ cx=+cx.toFixed(1); cy=+cy.toFixed(1); if(sh==='s') return `<rect x="${cx-3.2}" y="${cy-3.2}" width="6.4" height="6.4" fill="#fff" stroke="${c}" stroke-width="1.8"/>`; if(sh==='t') return `<polygon points="${cx},${(cy-4).toFixed(1)} ${(cx-3.8).toFixed(1)},${(cy+3.2).toFixed(1)} ${(cx+3.8).toFixed(1)},${(cy+3.2).toFixed(1)}" fill="#fff" stroke="${c}" stroke-width="1.8"/>`; return `<circle cx="${cx}" cy="${cy}" r="3.4" fill="#fff" stroke="${c}" stroke-width="1.8"/>`; };
  const bg=`<rect x="${pl}" y="${pt}" width="${pw}" height="${ph}" fill="#f8fafc"/>`;
  let grid=''; for(let s=0;s<=4;s++){ const gy=pt+ph-(s/4)*ph; grid+=`<line x1="${pl}" y1="${gy}" x2="${W-pr}" y2="${gy}" stroke="${s===0?'#cbd5e1':'#e9edf2'}"/>`; }
  let xl=''; for(let i=0;i<N;i++) xl+=`<text x="${x(i)}" y="${H-12}" text-anchor="middle" font-size="10" fill="#94a3b8">${i+1}月</text>`;
  const pathOf=(m,arr)=>{ let d=''; arr.forEach((v,i)=>{ if(v==null)return; d+=(d?' L':'M')+x(i).toFixed(1)+' '+yv(m,v).toFixed(1); }); return d; };
  let series='';
  if(type==='bar'){
    const slot=pw/N*0.72, bw=slot/Math.max(keys.length,1);
    M.forEach((m,gi)=>{ m.cur.forEach((v,i)=>{ if(v==null)return; const bh=(v/m.nm)*ph, bx=x(i)-slot/2+gi*bw; series+=`<rect x="${bx.toFixed(1)}" y="${(pt+ph-bh).toFixed(1)}" width="${(bw*0.86).toFixed(1)}" height="${bh.toFixed(1)}" fill="${m.color}"/>`; }); });
    if(compare) M.forEach(m=>{ series+=`<path d="${pathOf(m,m.prev)}" fill="none" stroke="${m.color}" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.55"/>`; });
  } else {
    M.forEach(m=>{
      if(compare) series+=`<path d="${pathOf(m,m.prev)}" fill="none" stroke="${m.color}" stroke-width="2" stroke-dasharray="6 4" opacity="0.55"/>`;
      series+=`<path d="${pathOf(m,m.cur)}" fill="none" stroke="${m.color}" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>`;
      m.cur.forEach((v,i)=>{ if(v==null)return; series+=mk(m.shape,x(i),yv(m,v),m.color); });
    });
  }
  let hover=''; const band=pw/(N-1);
  for(let i=0;i<N;i++) hover+=`<rect x="${(x(i)-band/2).toFixed(1)}" y="${pt}" width="${band.toFixed(1)}" height="${ph}" fill="transparent" pointer-events="all" onmouseenter="bizHover(${i})"/>`;
  return `<svg id="bizsvg" viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block">${bg}${grid}${series}${xl}${hover}</svg>`;
}
function sparkSVG(key){
  const M=MET_DEF[key], cur=SERIES[key][2026], n=cur.length, W=160,H=42,pw=W-4,ph=H-8, nm=niceMaxOf(cur);
  const x=i=>2+i*(pw/(n-1)), y=v=>4+ph-(v/nm)*ph;
  const pts=cur.map((v,i)=>[x(i),y(v)]);
  const line='M'+pts.map(p=>`${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' L');
  const area=`M${pts[0][0].toFixed(1)} ${(4+ph).toFixed(1)} `+pts.map(p=>`L${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ')+` L${pts[n-1][0].toFixed(1)} ${(4+ph).toFixed(1)} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:170px;height:42px;display:block"><defs><linearGradient id="sp_${key}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${M.color}" stop-opacity="0.3"/><stop offset="1" stop-color="${M.color}" stop-opacity="0"/></linearGradient></defs><path d="${area}" fill="url(#sp_${key})"/><path d="${line}" fill="none" stroke="${M.color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/><circle cx="${pts[n-1][0].toFixed(1)}" cy="${pts[n-1][1].toFixed(1)}" r="2.8" fill="${M.color}"/></svg>`;
}
function kpiCard(key){

/* アパートの本来IRR：保有中の年間賃料＋期末の売却額を考慮（月次→年率） */
function irrApt(cost,rentAnnual,sale,months){
  if(cost<=0||sale<=0||months<=0) return 0;
  const cf=[-cost]; for(let m=1;m<=months;m++) cf.push(rentAnnual/12 + (m===months?sale:0));
  const npv=r=>cf.reduce((s,c,m)=>s+c/Math.pow(1+r,m),0);
  let lo=-0.9, hi=1.0; for(let k=0;k<100;k++){ const mid=(lo+hi)/2; if(npv(mid)>0) lo=mid; else hi=mid; }
  return Math.pow(1+(lo+hi)/2,12)-1;
}

function recalcNew(){
  const land=gv('n_land'),chukai=gv('n_chukai'),out=gv('n_out'),demo=gv('n_demo'),lifeline=gv('n_lifeline'),assign=gv('n_assign'),survey=gv('n_survey'),evict=gv('n_evict'),other=gv('n_other');
  const kenchiku=gv('n_kenchiku'),sekkei=gv('n_sekkei'),jiban=gv('n_jiban'),infra=gv('n_infra'),gaikou=gv('n_gaikou'),kasi=gv('n_kasi');
  const inshi=gv('n_inshi'),shihou=gv('n_shihou'),yobi=gv('n_yobi'),kanriOther=gv('n_kanriOther'),eigyoOther=gv('n_eigyoOther');
  const kotei=gv('n_kotei'),beval=gv('n_beval'),period=gv('n_period')||12;
  const SCN=newScenarios(); const prices=SCN.prices;
  const p1=prices[0]||0, p2=prices[SCN.ji]||0;
  const borrow=land*0.9, interest=borrow*0.035/12*period, jimu=borrow*0.01;
  const autoTax=kotei*0.015 + beval*0.03 + kotei*0.014 + beval*0.003 + kotei*0.02 + beval*0.02 + borrow*0.004;
  const taxes=autoTax + inshi;
  const salesFee=(p1*0.03+60000)*1.1;
  const landBlock=land+chukai+out+demo+lifeline+assign+survey+evict+other;
  const bldgBlock=kenchiku+sekkei+jiban+infra+gaikou+kasi;
  const broker=false;   // （旧・業者売りの諸費用買主負担ケースは廃止。種別は資産区分に統一）
  const taxesC=broker?0:taxes, admin=broker?0:(shihou+yobi+kanriOther+salesFee), nonop=broker?0:(interest+jimu+eigyoOther);

/* ---------- AI分析レポート用レーダーチャートSVG生成 ---------- */
function radarSVG(axes, size){
  if(!axes || axes.length < 3) return '';
  const N = axes.length, cx = size/2, cy = size/2, R = size/2 - 36;
  const angle = i => (Math.PI * 2 / N) * i - Math.PI/2;
  const px = (i, r) => cx + r * Math.cos(angle(i));
  const py = (i, r) => cy + r * Math.sin(angle(i));
  const grids = [25,50,75,100].map(pct => {
    const r = R * pct/100;
    const pts = axes.map((_,i) => `${px(i,r).toFixed(1)},${py(i,r).toFixed(1)}`).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="#e2e8f0" stroke-width="${pct===100?1.2:0.8}"/>`;
  }).join('');
  const axLines = axes.map((_,i) => `<line x1="${cx}" y1="${cy}" x2="${px(i,R).toFixed(1)}" y2="${py(i,R).toFixed(1)}" stroke="#e2e8f0" stroke-width="0.8"/>`).join('');
  const pts = axes.map((a,i) => {
    const r = R * Math.max(0,Math.min(100,a.score))/100;
    return `${px(i,r).toFixed(1)},${py(i,r).toFixed(1)}`;
  }).join(' ');
  const dots = axes.map((a,i) => {
    const r = R * Math.max(0,Math.min(100,a.score))/100;
    return `<circle cx="${px(i,r).toFixed(1)}" cy="${py(i,r).toFixed(1)}" r="3.5" fill="#729c3a" stroke="#fff" stroke-width="1.5"/>`;
  }).join('');
  const labels = axes.map((a,i) => {
    const lx = px(i, R+22), ly = py(i, R+22);
    const anchor = lx < cx-5 ? 'end' : lx > cx+5 ? 'start' : 'middle';
    return `<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" font-size="9.5" fill="#475569">${a.label}</text>
<text x="${lx.toFixed(1)}" y="${(ly+12).toFixed(1)}" text-anchor="${anchor}" dominant-baseline="middle" font-size="9" fill="#729c3a" font-weight="700">${a.score}</text>`;
  }).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="overflow:visible">
  ${grids}${axLines}
  <polygon points="${pts}" fill="rgba(114,156,58,0.25)" stroke="#729c3a" stroke-width="2"/>
  ${dots}${labels}
</svg>`;
}

/* ---------- 申請前確認ページ（3段フロー：入力→確認→完了） ---------- */

  // recalcNew と完全に同じ読み方（gv＝入力欄が無ければ保存値NEW_VALSを読む）＝フォームのリアルタイム判定と必ず一致させる
  const land=gv('n_land'),chukai=gv('n_chukai'),out=gv('n_out'),demo=gv('n_demo'),lifeline=gv('n_lifeline'),assign=gv('n_assign'),survey=gv('n_survey'),evict=gv('n_evict'),other=gv('n_other');

  const inshi=gv('n_inshi'),shihou=gv('n_shihou'),yobi=gv('n_yobi'),kanriOther=gv('n_kanriOther'),eigyoOther=gv('n_eigyoOther');
  const kotei=gv('n_kotei'),beval=gv('n_beval'),period=gv('n_period')||12;
  const SCN=newScenarios();
  const p1=SCN.prices[0]||0,p2=SCN.prices[SCN.ji]||0;
  const borrow=land*0.9,interest=borrow*0.035/12*period,jimu=borrow*0.01;
  const autoTax=kotei*0.015+beval*0.03+kotei*0.014+beval*0.003+kotei*0.02+beval*0.02+borrow*0.004;
  const taxes=autoTax+inshi;
  const salesFee=(p1*0.03+60000)*1.1;
  const landBlock=land+chukai+out+demo+lifeline+assign+survey+evict+other;
  const bldgBlock=kenchiku+sekkei+jiban+infra+gaikou+kasi;
  const admin=shihou+yobi+kanriOther+salesFee,nonop=interest+jimu+eigyoOther;
  const cost=landBlock+bldgBlock+taxes+admin+nonop;
  const r2=p2>0?(p2-cost)/p2:0;
  const irr=INCOME_TYPES.includes(NEW_TYPE)?irrApt(cost,gv('n_rent'),p2,period):((cost>0&&p2>0)?Math.pow(p2/cost,12/period)-1:0);
  let jmark,jlabel,jcls;
  if(r2>=0.10&&irr>=0.10){jmark='◎';jlabel='推奨';jcls='j-ok';}
  else if(r2>=0.08&&irr>=0.10){jmark='△';jlabel='条件付き可';jcls='j-warn';}
  else{jmark='×';jlabel='見送り';jcls='j-ng';}
  const MIN_RATE=0.08,MIN_IRR=0.10;
  const costMaxRate=p2*(1-MIN_RATE);
  const costMaxIRR=p2>0?p2/Math.pow(1+MIN_IRR,period/12):0;
  const costMax=Math.min(costMaxRate,costMaxIRR);
  const slack=costMax-cost;
  const minClear=(r2>=MIN_RATE&&irr>=MIN_IRR);
  const propName=NEW_VALS['n_name']||'（未入力）';

  // ② 似た過去案件（同種別・done・actualあり・最大3件 ＋ 見送り1件）

  const sameRej=DEALS.filter(d=>d.status==='rej'&&d.type===NEW_TYPE&&d.rejReason).slice(0,1);
  const _pastMax=sameDone.length?Math.max(...sameDone.map(d=>Math.max(rate(d,1),d.actual.profit/d.actual.price)),0.15):0.15;
  const pastRowHTML=sameDone.length?sameDone.map(d=>{

  const m2v=gv('n_m2'), tsuboCnt=m2v*0.3025, tsuboP=(tsuboCnt>0&&p2>0)?p2/tsuboCnt:0;

  if(!card) return;
  card.innerHTML=`<div style="padding:18px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;text-align:center">
    <div style="font-size:18px;font-weight:800;color:#15803d;margin-bottom:8px">✓ 申請しました（モック表示）</div>
    <div style="font-size:13px;color:var(--body);line-height:1.6;margin-bottom:14px">上長承認待ちとして登録され、上長 → 代表の順に承認へ回ります。</div>
    <button class="btn primary submit-green" style="width:auto;padding:9px 22px" onclick="go('dashboard')">ダッシュボードへ</button>
  </div>`;
  window.scrollTo(0,0);
}

/* ヘッダー全体検索：物件名・IDで該当ページへ */
function doSearch(){
  const el=document.getElementById('global-search'); if(!el) return;
  const q=(el.value||'').trim(); const msg=document.getElementById('search-msg'); if(msg)msg.textContent='';
  if(!q) return;
  const d=DEALS.find(x=>x.name===q||x.id===q) || DEALS.find(x=>x.name.includes(q)||x.id.includes(q));
  if(d){ el.value=''; go('detail',d.id); return; }
  const inv=INVENTORY.find(x=>x.name===q) || INVENTORY.find(x=>x.name.includes(q));
  if(inv){ el.value=''; go('ops'); return; }
  if(msg) msg.textContent='該当なし';
}
function initSearch(){
  const dl=document.getElementById('search-list'); if(!dl) return;
  const names=[...DEALS.map(d=>`${d.name}｜${d.id}`.replace(/｜.*/,'')), ...INVENTORY.map(i=>i.name)];
  const uniq=[...new Set([...DEALS.map(d=>d.name), ...DEALS.map(d=>d.id), ...INVENTORY.map(i=>i.name)])];
  dl.innerHTML=uniq.map(n=>`<option value="${n}"></option>`).join('');
}
/* 初期表示 */
initSearch();
go('dashboard');
</script>
